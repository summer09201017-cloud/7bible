<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="聖經查詢" />
    <meta name="description" content="多譯本聖經查詢：和合本、ESV、新譯本、ASV、KJV 並行對照" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>多譯本聖經查詢</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        let didReload = false;
        const reloadOnce = () => {
          if (didReload) return;
          didReload = true;
          window.location.reload();
        };
        navigator.serviceWorker.addEventListener('controllerchange', reloadOnce);
        navigator.serviceWorker.addEventListener('message', (e) => {
          if (e.data?.type === 'SW_UPDATED') reloadOnce();
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            reg.update();
            const handleNew = (worker) => {
              if (!worker) return;
              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            };
            handleNew(reg.installing);
            handleNew(reg.waiting);
            reg.addEventListener('updatefound', () => handleNew(reg.installing));
            setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
          });
        });
      }
    </script>
  </body>
</html>
